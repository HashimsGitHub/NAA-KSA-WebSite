<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | NUST Alumni Association</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="login">
  <nav class="topnav">
    <a class="brand" href="/"><img src="https://stnustksaalumni.blob.core.windows.net/site-images/NUST-logo.png" alt="NUST logo">NUST Alumni Association</a>
    <a href="/">Home</a>
    <a href="/pages/events.html">Events</a>
    <a data-requires="user" href="/pages/alumni.html">Alumni Directory</a>
    <a data-requires="user" href="/pages/blogs.html">Knowledge Base</a>
    <a href="/pages/about.html">About</a>
    <a href="/pages/charter.html">Charter</a>
    <a data-requires="contributor" href="/pages/admin.html">Control Panel</a>
    <a data-requires="guest" href="/pages/login.html">Login</a>
    <button data-requires="user" id="logoutButton" class="link-button" type="button">Logout</button>
  </nav>
  <main class="auth-shell">
    <section class="auth-panel">
      <p class="eyebrow">Member Access</p>
      <h1>Login</h1>
      <div data-auth="guest" class="grid one-col">
        <input id="email" type="email" placeholder="Email" autocomplete="username" />
        <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
        <button id="loginButton" type="button">Login</button>
      </div>
      <div data-auth="user" class="hidden">
        <p data-user-summary></p>
        <button id="logoutButton" type="button">Logout</button>
      </div>
      <p id="loginStatus" class="notice"></p>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
