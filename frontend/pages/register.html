<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register | NUST Alumni KSA</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="register">
  <nav class="topnav topnav-light">
    <a class="brand" href="/">NUST Alumni KSA</a>
    <a href="/pages/events.html">Events</a>
    <a href="/pages/login.html">Login</a>
  </nav>
  <main class="auth-shell">
    <section class="auth-panel">
      <p class="eyebrow">Alumni Access</p>
      <h1>Register</h1>
      <div class="grid one-col">
        <input id="regFullName" placeholder="Full name" />
        <input id="regEmail" type="email" placeholder="Email" autocomplete="username" />
        <input id="regPassword" type="password" placeholder="Password" autocomplete="new-password" />
        <button id="registerButton" type="button">Submit registration</button>
      </div>
      <p id="registerStatus" class="notice"></p>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
